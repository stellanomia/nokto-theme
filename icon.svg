<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e131f" />
      <stop offset="100%" stop-color="#05070a" />
    </linearGradient>

    <linearGradient id="moonGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#7b92e0" />
      <stop offset="100%" stop-color="#74dbf5" />
    </linearGradient>

    <filter id="glow" filterUnits="userSpaceOnUse" x="0" y="0" width="256" height="256">
      <feGaussianBlur stdDeviation="4.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
