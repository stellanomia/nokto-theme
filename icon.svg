        filter="url(#glow)"/>

  <g filter="url(#glow)">
    <line x1="135" y1="161" x2="160" y2="95" stroke="#b87a7a" stroke-width="14" stroke-linecap="round" />

    <path d="M 183 105 L 208 128 L 183 151" fill="none" stroke="#b87a7a" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
